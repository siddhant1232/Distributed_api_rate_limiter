version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=10
    depends_on:
      - redis
    networks:
      - ratelimit-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ratelimit-net

networks:
  ratelimit-net:
    driver: bridge
